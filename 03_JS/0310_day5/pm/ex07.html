<script>
  // 숫자 타입
  var integer = 10; // 정수
  var double = 10.12; // 실수
  var negative = -20; // 음의 정수

  var binary = 0b01000001; // 2진수 0b(binary) 표기
  var octal = 0o101; // 8진수 0o(octal) 표기
  var hex = 0x41; // 16진수 0x 표기

  // 표기법만 다를 뿐 모두 같은 값
  console.log(binary); // 65
  console.log(octal); // 65
  console.log(hex); // 65
  console.log(binary === octal); // true
  console.log(octal === hex); // true

  // 숫자 타입은 모두 실수로 처리
  console.log(1 === 1.0); // true
  console.log(4 / 2); // 2
  console.log(3 / 2); // 1.5

  // 숫자 타입 특별한 값 3가지
  console.log(10 / 0); // Infinity
  console.log(10 / -0); // -Infinity
  console.log(1 * 'String'); // NaN

  ```
  // JS는 대소문자 구분
  var x = nan; // ReferenceError: nan is not defined
  ```;

  // 문자열 타입
  var string;
  string = '문자열'; // 작은따옴표
  string = '문자열'; // 큰따옴표
  string = `문자열`; // 백틱 (ES6)

  string = '작은따옴표로 감싼 문자열 내의 "큰따옴표"는 문자열로 인식';
  string = "큰따옴표로 감싼 문자열 내의 '작은따옴표'는 문자열로 인식";

  ```
  // 따옴표로 감싸지 않은 값은 식별자로 인식
  var string = hello; // ReferenceError: hello is not defined
  ```;

  var template = `Template literal`;
  console.log(template); // Template literal

  ```
  // 백틱은 줄바꿈 허용 X
  var str = 'Hello 
  world.'; // SyntaxError: Invalid or unexpected token
  ```;

  var template = '<ul>\n\t<li><a href="#">Home</a></li>\n</ul>';
  console.log(template);
  /*
    <ul>
      <li><a href="#">Home</a></li>
    </ul>
  */

  var template = `<ul><li><a href="#">Home</a></li></ul>`;
  console.log(template);
  // <ul><li><a href="#">Home</a></li></ul>

  // ES6: 표현식 삽입
  var first = 'Yoomi';
  var last = 'Seo';
  console.log(`My name is ${first} ${last}.`); // My name is Yoomi Seo.

  console.log(`1 + 2 = ${1 + 2}`); // 1 + 2 = 3
  console.log('1 + 2 = ${1 + 2}'); // 1 + 2 = ${1 + 2}

  // 데이터 타입
  var foo = true;
  console.log(foo); // true

  var foo;
  console.log(foo); // undefined

  var foo;
  console.log(typeof foo); // undefined

  foo = 3;
  console.log(typeof foo); // number

  foo = 'Hello';
  console.log(typeof foo); // string

  foo = true;
  console.log(typeof foo); // boolean

  foo = null;
  console.log(typeof foo); // object

  foo = Symbol(); // 심벌
  console.log(typeof foo); // symbol

  foo = {}; // 객체
  console.log(typeof foo); // object

  foo = []; // 배열
  console.log(typeof foo); // object

  foo = function () {}; // 함수
  console.log(typeof foo); // function
</script>
