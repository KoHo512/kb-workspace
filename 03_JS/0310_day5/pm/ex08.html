<script>
  // 1. arr 변수에 빈 배열 선언
  let arr = [];

  // 2. arr의 배열에 대입
  arr[0] = 10;
  arr[1] = 20;
  arr[2] = 30;
  arr.push(40);
  arr.push(50);
  arr.push(60);

  // 3. arr 배열의 값 확인
  console.log(arr);
  console.log(arr[0]);

  console.log(arr.slice(2));
  console.log(arr);

  arr.splice(0, 1, 70);
  console.log(arr);

  /**
   * push() : 배열에 데이터 추가 (맨 끝 인덱스부터 추가)
   * slice() : 배열의 특정 인덱스 이후의 값 반환 (배열 내용 변경 X)
   * splice() : 배열의 특정 인덱스에 있는 값을 변경/삭제
   * **/
</script>
