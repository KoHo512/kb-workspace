<!doctype html>
<html lang="ko">
  <head>
    <title>Absolute</title>
  </head>
  <body>
    <div class="card">
      <div class="box"></div>
    </div>

    <style>
      .card {
        width: 200px;
        height: 150px;
        border: 1px solid black;
      }

      .box {
        width: 50px;
        height: 50px;
        background: red;
        /* 가장 가까운 부모 기준 */
        position: absolute;
        top: 20px;
        right: 20px;
      }
    </style>
  </body>
</html>
