<!doctype html>
<html lang="ko">
  <head>
    <title>Static</title>
  </head>
  <body>
    <div class="card">
      <div class="box"></div>
    </div>

    <style>
      .card {
        width: 200px;
        height: 150px;
        border: 1px solid black;
      }

      .box {
        width: 50px;
        height: 50px;
        background: red;
        /* static은 top, bottom, left, right가 적용되지 않음 */
        position: static;
        top: 20px;
        left: 20px;
      }
    </style>
  </body>
</html>
