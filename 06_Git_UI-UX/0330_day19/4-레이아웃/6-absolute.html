<!doctype html>
<html lang="ko">
  <head>
    <title>Document</title>
    <style>
      .container {
        width: 400px;
        height: 300px;
        border: 3px solid black;
        position: relative;
      }
      .container > div {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <h2>절대 위치를 사용한 요소 배치</h2>
    <div class="container">
      <div style="background-color: red; top: 10px; left: 10px"></div>
      <div style="background-color: green; top: 10px; left: 290px"></div>
      <div style="background-color: yellow; top: 190px; left: 10px"></div>
      <div style="background-color: blue; top: 190px; left: 290px"></div>
    </div>
    <h2>안녕하세요?</h2>
  </body>
</html>
