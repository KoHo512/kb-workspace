<!doctype html>
<html lang="ko">
  <head>
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h1>{{ message }}</h1>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let model = { message: 'Hello Vue!' };
      let vm = Vue.createApp({
        name: 'app',
        data() {
          return model;
        },
      }).mount('#app');
    </script>
  </body>
</html>
