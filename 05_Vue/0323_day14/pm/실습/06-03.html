<!doctype html>
<html lang="ko">
  <head>
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button
        :style="{backgroundColor,color}"
        @mouseover.stop="over"
        @mouseout.stop="out"
      >
        테스트
      </button>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            backgroundColor: 'aqua',
            color: 'black',
          };
        },
        methods: {
          over(e) {
            this.backgroundColor = 'purple';
            this.color = 'yellow';
          },
          out(e) {
            this.backgroundColor = 'aqua';
            this.color = 'black';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
