<!doctype html>
<html lang="ko">
  <head>
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button
        :style="{backgroundColor, color}"
        @mouseover.stop="overEvent"
        @mouseout.stop="outEvent"
      >
        테스트
      </button>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            backgroundColor: 'yellowgreen',
            color: 'black',
          };
        },
        methods: {
          overEvent() {
            this.backgroundColor = 'green';
            this.color = 'yellow';
          },
          outEvent() {
            this.backgroundColor = 'yellowgreen';
            this.color = 'black';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
