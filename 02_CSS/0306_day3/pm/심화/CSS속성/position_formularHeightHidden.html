<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body > div {
        position: relative;
        border: 3px solid black;
        height: 100px;
        overflow: hidden;
      }
      .box {
        position: absolute;
        width: 100px;
        height: 100px;
      }
      .box:nth-child(1) {
        left: 0px;
        top: 0px;
        z-index: 10;
        background-color: red;
      }
      .box:nth-child(2) {
        left: 50px;
        top: 50px;
        z-index: 5;
        background-color: green;
      }
      .box:nth-child(3) {
        left: 100px;
        top: 100px;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
  </body>
</html>
