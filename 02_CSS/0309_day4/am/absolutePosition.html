<!doctype html>
<html lang="ko">
  <head>
    <title>Document</title>
    <style>
      #container {
        width: 400px;
        height: 300px;
        border: 3px solid black;
        overflow: hidden;
        position: relative;
      }
      .circle {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 50%;
      }
      #red {
        background: red;
      }
    </style>
  </head>
  <body>
    <h1>Lorem, ipsum dolor.</h1>
    <div id="container">
      <div id="red" class="circle"></div>
      <div id="green" class="circle"></div>
      <div id="blue" class="circle"></div>
      <div id="yellow" class="circle"></div>
    </div>
    <h1>Lorem, ipsum dolor.</h1>
  </body>
</html>
