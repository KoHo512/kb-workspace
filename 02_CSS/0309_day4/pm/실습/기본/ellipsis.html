<html lang="ko">
  <head>
    <title>Document</title>
    <style>
      .ellipsis {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <h1 class="ellipsis">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur,
      magni.
    </h1>
    <p class="ellipsis">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quam!
    </p>
  </body>
</html>
